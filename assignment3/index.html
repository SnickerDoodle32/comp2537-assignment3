<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Memory Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="dark">
  <div class="bg-decoration">
    <img src="avatar.png" class="bg-pokemon p1" alt="">
    <img src="avatar (1).png" class="bg-pokemon p2" alt="">
    <img src="avatar (2).png" class="bg-pokemon p3" alt="">
    <img src="avatar (3).png" class="bg-pokemon p4" alt="">
    <img src="avatar (4).png" class="bg-pokemon p5" alt="">
    <img src="ultra-ball.png" class="bg-ball b1" alt="">
    <img src="superball.png" class="bg-ball b2" alt="">
    <img src="mega-ball.png" class="bg-ball b3" alt="">
  </div>

  <div class="container">
    <header class="game-header">
      <div class="header-logo">
        <img src="ball.png" class="logo-icon" alt="Pokemon">
        <h1>Pokemon Memory</h1>
      </div>
      <button id="theme-toggle" class="btn theme-btn"><i class="fa-solid fa-sun"></i> Light</button>
    </header>

    <div class="controls">
      <div class="difficulty-select">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
          <option value="test">Test (3 pairs / 5s)</option>
          <option value="easy">Easy (3 pairs / 60s)</option>
          <option value="medium" selected>Medium (6 pairs / 90s)</option>
          <option value="hard">Hard (10 pairs / 120s)</option>
        </select>
      </div>
      <div class="buttons">
        <button id="start-btn" class="btn start-btn"><i class="fa-solid fa-play"></i> Start</button>
        <button id="reset-btn" class="btn reset-btn"><i class="fa-solid fa-rotate-right"></i> Reset</button>
        <button id="end-btn" class="btn end-btn"><i class="fa-solid fa-stop"></i> End Game</button>
        <button id="peek-btn" class="btn peek-btn" disabled><i class="fa-solid fa-eye"></i> Peek</button>
      </div>
    </div>

    <div class="status-bar">
      <div class="stat">
        <span class="stat-label">Clicks</span>
        <span id="clicks" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Matched</span>
        <span id="matched" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Pairs Left</span>
        <span id="pairs-left" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Total Pairs</span>
        <span id="total-pairs" class="stat-value">0</span>
      </div>
      <div class="stat timer">
        <span class="stat-label">Time</span>
        <span id="time-remaining" class="stat-value">--</span>
      </div>
    </div>

    <div id="game-message" class="game-message hidden"></div>

    <div id="game_grid"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="index.js"></script>
</body>

</html>
